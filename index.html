<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>微信表情包制作分享</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    .viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #fff;
    }
    .stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 1920px;
      height: 1080px;
      transform-origin: 0 0;
      background: #fff;
      overflow: hidden;
    }
    .slide {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      background: #fff;
      overflow: hidden;
    }
    .slide.entering {
      animation: softIn .24s cubic-bezier(.22,.8,.22,1) both;
    }
    .slide-image,
    .red-frame-cover {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .red-frame-cover {
      pointer-events: none;
      opacity: 0;
    }
    .red-frame-cover.visible {
      opacity: 1;
    }
    .red-frame-cover.revealing {
      animation: redFrameReveal .42s cubic-bezier(.18,.84,.22,1) both;
    }
    .video-overlay {
      position: absolute;
      left: 717.8582677165355px;
      top: 21.12488188976378px;
      width: 484.2834645669291px;
      height: 1037.7502362204725px;
      object-fit: cover;
      background: #fff;
      display: none;
    }
    .video-overlay.visible {
      display: block;
      animation: videoFocus .42s cubic-bezier(.22,.8,.22,1) both;
    }
    .hit {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 42%;
      z-index: 10;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      cursor: default;
      outline: 0;
      box-shadow: none;
      -webkit-tap-highlight-color: transparent;
    }
    .hit:focus,
    .hit:focus-visible,
    .hit:active {
      outline: 0;
      box-shadow: none;
    }
    .hit.prev { left: 0; }
    .hit.next { right: 0; }
    .demo-cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 144px;
      height: auto;
      z-index: 30;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(calc(var(--cursor-x,32px) - 8px), calc(var(--cursor-y,32px) - 42px), 0);
      transition: opacity .18s ease, transform .045s linear;
    }
    .demo-cursor.visible {
      opacity: 1;
    }
    .demo-cursor img {
      display: block;
      width: 100%;
      height: auto;
    }
    @keyframes softIn {
      from { opacity: .96; transform: scale(.997); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes videoFocus {
      0% { transform: scale(.985); filter: brightness(.98); }
      100% { transform: scale(1); filter: none; }
    }
    @keyframes redFrameReveal {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    @media print {
      .hit, .demo-cursor { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, ::before, ::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <main class="stage" id="stage">
      <section class="slide" id="slide">
        <img class="slide-image" id="slideImage" src="rendered-webp/slide-001.webp?v=red-frame-reveal-3" alt="">
        <img class="red-frame-cover" id="redFrameCover" src="" alt="" aria-hidden="true">
        <video
          class="video-overlay"
          id="videoOverlay"
          muted
          loop
          playsinline
          preload="metadata"
          poster="ppt-faithful/media/slide-033-poster.png"
          src="ppt-faithful/media/media1.mp4"></video>
      </section>
    </main>
  </div>
  <button class="hit prev" type="button" aria-label="上一页"></button>
  <button class="hit next" type="button" aria-label="下一页"></button>
  <div class="demo-cursor" id="demoCursor" aria-hidden="true">
    <img src="assets/arrange-cursor.png" alt="">
  </div>
  <script>
    class Deck {
      constructor() {
        this.totalSlides = 65;
        this.current = this.parseHash();
        this.frameSlides = new Set([16, 17, 18, 23, 24, 25, 26, 27, 28, 29]);
        this.revealedFrames = new Set();
        this.cursorStartSlide = 15;
        this.version = "red-frame-reveal-3";
        this.slide = document.getElementById("slide");
        this.slideImage = document.getElementById("slideImage");
        this.redFrameCover = document.getElementById("redFrameCover");
        this.videoOverlay = document.getElementById("videoOverlay");
        this.stage = document.getElementById("stage");
        this.cursor = document.getElementById("demoCursor");
        this.pointer = { x: 32, y: 32 };
        this.bind();
        this.scale();
        this.render(false);
      }
      parseHash() {
        const raw = parseInt(location.hash.slice(1), 10);
        if (!Number.isFinite(raw)) return 1;
        return Math.max(1, Math.min(raw, 65));
      }
      pad(n) {
        return String(n).padStart(3, "0");
      }
      imageSrc(n) {
        return `rendered-webp/slide-${this.pad(n)}.webp?v=${this.version}`;
      }
      frameSrc(n) {
        return `rendered-webp-frame-base/slide-${this.pad(n)}.webp?v=${this.version}`;
      }
      bind() {
        addEventListener("resize", () => this.scale());
        addEventListener("hashchange", () => {
          this.current = this.parseHash();
          this.render(false);
        });
        document.addEventListener("keydown", (e) => {
          if (["ArrowRight", "PageDown", " "].includes(e.key)) {
            e.preventDefault();
            this.next();
          }
          if (["ArrowLeft", "PageUp"].includes(e.key)) {
            e.preventDefault();
            this.prev();
          }
          if (e.key === "Home") {
            e.preventDefault();
            this.goTo(1);
          }
          if (e.key === "End") {
            e.preventDefault();
            this.goTo(this.totalSlides);
          }
        });
        let startX = 0;
        addEventListener("touchstart", (e) => {
          startX = e.changedTouches[0].clientX;
        }, { passive: true });
        addEventListener("touchend", (e) => {
          const dx = e.changedTouches[0].clientX - startX;
          if (Math.abs(dx) > 50) {
            if (dx < 0) this.next();
            else this.prev();
          }
        }, { passive: true });
        document.querySelector(".hit.prev").onclick = () => this.prev();
        document.querySelector(".hit.next").onclick = () => this.next();
        addEventListener("pointermove", (e) => this.moveCursor(e.clientX, e.clientY), { passive: true });
        addEventListener("touchmove", (e) => {
          const touch = e.changedTouches && e.changedTouches[0];
          if (touch) this.moveCursor(touch.clientX, touch.clientY);
        }, { passive: true });
      }
      moveCursor(x, y) {
        this.pointer = { x, y };
        this.cursor.style.setProperty("--cursor-x", `${x}px`);
        this.cursor.style.setProperty("--cursor-y", `${y}px`);
      }
      updateCursorVisibility() {
        this.cursor.classList.toggle("visible", this.current >= this.cursorStartSlide);
      }
      scale() {
        const viewportWidth = Math.max(
          window.innerWidth || 0,
          document.documentElement.clientWidth || 0,
          document.body ? document.body.clientWidth : 0,
          1
        );
        const viewportHeight = Math.max(
          window.innerHeight || 0,
          document.documentElement.clientHeight || 0,
          document.body ? document.body.clientHeight : 0,
          1
        );
        const factor = Math.max(.01, Math.min(viewportWidth / 1920, viewportHeight / 1080));
        this.stage.style.transform = `translate(${(viewportWidth - 1920 * factor) / 2}px, ${(viewportHeight - 1080 * factor) / 2}px) scale(${factor})`;
      }
      syncVideo() {
        if (this.current === 33) {
          this.videoOverlay.classList.add("visible");
          try {
            this.videoOverlay.currentTime = 0;
          } catch (error) {}
          const play = this.videoOverlay.play();
          if (play && play.catch) play.catch(() => {});
        } else {
          this.videoOverlay.pause();
          this.videoOverlay.classList.remove("visible");
        }
      }
      render(animate = true) {
        this.slideImage.src = this.imageSrc(this.current);
        if (this.frameSlides.has(this.current) && !this.revealedFrames.has(this.current)) {
          this.redFrameCover.src = this.frameSrc(this.current);
          this.redFrameCover.classList.remove("revealing");
          this.redFrameCover.classList.add("visible");
        } else {
          this.redFrameCover.classList.remove("visible", "revealing");
          this.redFrameCover.removeAttribute("src");
        }
        this.slide.classList.remove("entering");
        if (animate) {
          void this.slide.offsetWidth;
          this.slide.classList.add("entering");
        }
        this.syncVideo();
        this.updateCursorVisibility();
        history.replaceState(null, "", `#${this.current}`);
      }
      revealFrame() {
        if (!this.frameSlides.has(this.current) || this.revealedFrames.has(this.current)) return false;
        this.revealedFrames.add(this.current);
        this.redFrameCover.classList.add("revealing");
        this.redFrameCover.addEventListener("animationend", () => {
          this.redFrameCover.classList.remove("visible", "revealing");
        }, { once: true });
        return true;
      }
      goTo(n) {
        this.current = n;
        this.render();
      }
      next() {
        if (this.revealFrame()) return;
        this.current = this.current >= this.totalSlides ? 1 : this.current + 1;
        this.render();
      }
      prev() {
        this.current = this.current <= 1 ? this.totalSlides : this.current - 1;
        this.render();
      }
    }
    const boot = () => {
      if (window.deck) return;
      window.deck = new Deck();
      requestAnimationFrame(() => window.deck && window.deck.scale());
      setTimeout(() => window.deck && window.deck.scale(), 120);
      setTimeout(() => window.deck && window.deck.scale(), 480);
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot, { once: true });
    } else {
      boot();
    }
    addEventListener("load", () => window.deck && window.deck.scale(), { once: true });
    addEventListener("pageshow", () => window.deck && window.deck.scale());
  </script>
</body>
</html>
